name: Playwright Python Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

defaults:
  run:
    working-directory: playwright_python_juice_shop

jobs:
  playwright-python-tests:
    runs-on: ubuntu-latest

    services:
      juice-shop:
        image: bkimminich/juice-shop
        ports:
          - 3000:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: playwright_python_juice_shop/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps chromium

      - name: Wait for OWASP Juice Shop to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "OWASP Juice Shop is ready"
              exit 0
            fi
            echo "Waiting for OWASP Juice Shop..."
            sleep 2
          done
          echo "OWASP Juice Shop did not start in time"
          exit 1

      # - name: Run Playwright Python tests
      #   run: |
      #     python -m pytest \
      #       python_tests/test_TC001_homepage.py \
      #       python_tests/test_TC002_locators_basic.py \
      #       python_tests/test_TC003_search_product.py \
      #       python_tests/test_TC004_assertions_basic.py \
      #       python_tests/test_TC005_signup_user.py \
      #       python_tests/test_TC006_login_user_with_fixture.py \
      #       python_tests/test_TC007_add_product_with_logged_in_fixture.py \
      #       python_tests/test_TC008_add_specific_product_with_fixture.py \
      #       python_tests/test_TC009_remove_product_with_fixture.py \
      #       python_tests/test_TC010_negative_login.py \
      #       python_tests/test_TC011_login_form_validation.py \
      #       python_tests/test_TC012_search_no_result.py \
      #       python_tests/test_TC013_product_in_basket_fixture_check.py \
      #       python_tests/test_TC014_basket_quantity_with_fixture.py \
      #       python_tests/test_TC015_checkout_address_fixture_check.py \
      #       python_tests/test_TC017_checkout_delivery_fixture_check.py \
      #       python_tests/test_TC018_checkout_payment_fixture_check.py \
      #       python_tests/test_TC020_checkout_order_summary_fixture_check.py \
      #       python_tests/test_TC021_place_order_with_fixture.py \
      #       --browser chromium \
      #       --tracing retain-on-failure \
      #       --screenshot only-on-failure \
      #       --video retain-on-failure

      - name: Run Playwright Python tests by CI marker
        run: |
          python -m pytest -m ci \
            --browser chromium \
            --tracing retain-on-failure \
            --screenshot only-on-failure \
            --video retain-on-failure


      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: playwright_python_juice_shop/test-results/
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: playwright_python_juice_shop/test-results/
          if-no-files-found: ignore